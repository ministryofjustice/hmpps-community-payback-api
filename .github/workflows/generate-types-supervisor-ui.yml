name: Generate Community Payback Supervisor UI Types

on:
  workflow_call:
  workflow_dispatch:

jobs:
  generate-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-actions: write
          repositories: 
            hmpps-community-payback-supervisors-ui
  
      - name: Trigger Community Payback Supervisor UI Type Generation Workflow
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'hmpps-community-payback-supervisors-ui',
              workflow_id: 'generate-types.yml',
              ref: 'main'
            })
